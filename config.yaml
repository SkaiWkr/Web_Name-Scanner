scoring:
  weights:
    levenshtein_similarity: 25
    domain_age: 20
    brand_content_presence: 20
    ssl_issuer_reputation: 15
    discovery_source: 20
  domain_age_days:
    very_new: 30
    new: 180
    established: 365
  ssl_trusted_issuers:
    - "Let's Encrypt"
    - "DigiCert"
    - "Sectigo"
    - "GlobalSign"
    - "Google Trust Services"
    - "Amazon"
  discovery_source_scores:
    cert_transparency_unrelated: 100
    google_search: 85
    typosquat_permutation: 75
    dns_bruteforce: 60
    cert_transparency_related: 50
  content_keyword_score: 100
  missing_data_score: 50
scan:
  max_permutations: 75
  max_candidates: 150
  max_dns_bruteforce_parents: 25
  collect_whois_for_unresolved: false
network:
  timeout_seconds: 4
  retries: 3
  backoff_factor: 0.8
  rate_limit_seconds:
    crtsh: 1.0
    dns: 0.05
    google: 1.0
    http: 0.2
subdomains:
  - login
  - secure
  - verify
  - account
  - portal
  - my
  - auth
  - signin
  - support
  - billing
  - payment
  - update
  - recovery
  - admin
  - dashboard
  - mail
  - webmail
  - app
  - help
  - customer
